<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Crop Doctor</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="loginpageStyle.css">
    <link rel="stylesheet" href="translate.css">
</head>
<body>

    <div class="auth-translate-wrapper fade-in">
        <span class="language-label">Language:</span>
        <div id="google_translate_element" class="translate-container auth-translate"></div>
    </div>

    <div class="login-container">
        <div class="login-box fade-in">
            <div class="auth-header">
                <h2>🌾 Welcome Back</h2>
                <p>Login to access your farm dashboard</p>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>

            <p class="register-link">
                Don't have an account? 
                <a href="register.html">Register</a>
            </p>

            <a href="index.html" class="back-home">← Back to Home</a>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,hi,mr,ta,te,kn,ml,gu,pa,bn,ur',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script src="auth.js"></script>
</body>
</html>
