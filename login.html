<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Crop Doctor</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="loginpageStyle.css">
    <link rel="stylesheet" href="translate.css">
</head>
<body>

    <div class="auth-translate-wrapper fade-in">
        <span class="language-label">Language:</span>
        <div id="google_translate_element" class="translate-container auth-translate"></div>
    </div>

    <div class="login-container">
        <div class="login-box fade-in">
            <div class="auth-header">
                <h2>🌾 Welcome Back</h2>
                <p>Login to access your farm dashboard</p>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                    <a href="#" id="forgot-password-link" style="display: block; text-align: right; font-size: 0.85rem; color: var(--primary-color); margin-top: 5px; text-decoration: none; font-weight: 500;">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>

            <p class="register-link">
                Don't have an account? 
                <a href="register.html">Register</a>
            </p>

            <a href="index.html" class="back-home">← Back to Home</a>
        </div>
        
        <!-- Forgot Password Modal -->
        <div id="forgotPasswordModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
            <div class="modal-content fade-in" style="background: white; padding: 30px; border-radius: var(--border-radius-lg); width: 90%; max-width: 400px; text-align: center; position: relative; border: 1px solid rgba(255,255,255,0.2); box-shadow: var(--shadow-lg);">
                <span class="close-modal" id="close-forgot-modal" style="position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: var(--text-muted);">&times;</span>
                <h3 style="margin-bottom: 20px; color: var(--primary-dark); font-family: 'Outfit', sans-serif;">Forgot Password</h3>
                
                <div id="forgot-step-1">
                    <p style="font-size: 0.95rem; margin-bottom: 15px; color: var(--text-main);">Select an option to recover or reset your password.</p>
                    <div class="input-group" style="text-align: left;">
                        <input type="email" id="forgot-email" placeholder="Enter your registered email" required style="margin-bottom: 15px; width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: var(--border-radius-md); font-size: 1rem; background-color: #f8fafc; transition: all 0.3s;">
                    </div>
                    <button type="button" class="login-btn" onclick="sendVerificationCode('change')" style="margin-bottom: 10px;">Change Password</button>
                    <button type="button" class="login-btn" onclick="sendVerificationCode('know')" style="background-color: var(--text-muted); box-shadow: none;">Know the Password</button>
                </div>

                <div id="forgot-step-2" style="display: none;">
                    <p style="font-size: 0.95rem; margin-bottom: 15px; color: var(--text-main);">We've sent a verification code to your email.</p>
                    <div class="input-group" style="text-align: left;">
                        <input type="text" id="verification-code" placeholder="Enter 4-digit code" required style="margin-bottom: 15px; width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: var(--border-radius-md); font-size: 1rem; background-color: #f8fafc; transition: all 0.3s;">
                    </div>
                    <div id="new-password-group" class="input-group" style="display: none; text-align: left;">
                        <input type="password" id="new-password" placeholder="Enter new password" style="margin-bottom: 15px; width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: var(--border-radius-md); font-size: 1rem; background-color: #f8fafc; transition: all 0.3s;">
                    </div>
                    <button type="button" class="login-btn" onclick="verifyAndProceed()">Submit</button>
                </div>
            </div>
        </div>

    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,hi,mr,ta,te,kn,ml,gu,pa,bn,ur',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script src="auth.js"></script>
</body>
</html>
