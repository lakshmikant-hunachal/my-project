<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Crop Doctor</title>
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#059669">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3204/3204121.png">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="registerpageStyle.css">
    <link rel="stylesheet" href="translate.css">
</head>
<body>

    <div class="auth-translate-wrapper fade-in">
        <span class="language-label">Language:</span>
        <div id="google_translate_element" class="translate-container auth-translate"></div>
    </div>

    <div class="register-container">
        <div class="register-box fade-in">
            <div class="auth-header">
                <img src="logo.png" alt="Smart Crop Doctor" style="height: 60px; border-radius: 8px; margin-bottom: 10px;">
                <h2>Join Us Today</h2>
                <p>Create an account to get expert disease detection</p>
            </div>

            <form id="register-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="reg-phone" placeholder="Enter your phone number" required pattern="(\+?\d{1,3}[- ]?)?\d{10}" title="Please enter a valid 10-digit phone number, country code is optional">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Create password" required minlength="6" title="Minimum 6 characters required">
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="reg-confirm-password" placeholder="Confirm password" required minlength="6">
                </div>

                <button type="submit" class="login-btn">Register</button>
            </form>

            <p class="register-link">
                Already have an account? 
                <a href="login.html">Login</a>
            </p>

            <a href="index.html" class="back-home">← Back to Home</a>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,hi,mr,ta,te,kn,ml,gu,pa,bn,ur',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script src="auth.js"></script>
</body>
</html>
