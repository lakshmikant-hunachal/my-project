<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Crop Doctor</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="registerpageStyle.css">
</head>
<body>

    <div class="register-container">
        <div class="register-box fade-in">
            <div class="auth-header">
                <h2>🌾 Join Smart Crop</h2>
                <p>Create an account to get expert disease detection</p>
            </div>

            <form id="register-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="reg-phone" placeholder="Enter your phone number" required pattern="[0-9]{10}" title="Please enter a valid 10-digit phone number">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Create password" required minlength="6" title="Minimum 6 characters required">
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="reg-confirm-password" placeholder="Confirm password" required minlength="6">
                </div>

                <button type="submit" class="login-btn">Register</button>
            </form>

            <p class="register-link">
                Already have an account? 
                <a href="login.html">Login</a>
            </p>

            <a href="index.html" class="back-home">← Back to Home</a>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
